name: Delete old sync documents

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Delete documents
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          app_id = os.environ["FEISHU_APP_ID"]
          app_secret = os.environ["FEISHU_APP_SECRET"]

          def req(method, url, body=None):
              headers = {"Content-Type": "application/json; charset=utf-8"}
              data = json.dumps(body).encode() if body else None
              r = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(r, timeout=15) as resp:
                  return json.load(resp)

          # Get token
          token_data = req("POST",
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              {"app_id": app_id, "app_secret": app_secret})
          token = token_data["tenant_access_token"]
          print(f"Got token: {token[:10]}...")

          # Delete known old docs
          doc_ids = [
              "LIDVddFO5oaYEZxt3H9cQP9bnof",   # old group
              "RdvXdC3tcoS6T8xmzvAcI3Xvn2e",   # current group (June 2026)
          ]
          auth_header = {"Authorization": f"Bearer {token}", "Content-Type": "application/json; charset=utf-8"}
          for did in doc_ids:
              try:
                  r = urllib.request.Request(
                      f"https://open.feishu.cn/open-apis/drive/v1/files/{did}?type=docx",
                      headers=auth_header, method="DELETE")
                  with urllib.request.urlopen(r, timeout=15) as resp:
                      data = json.load(resp)
                  code = data.get("code", -1)
                  msg = data.get("msg", "")
                  status = "DELETED" if code == 0 else f"FAILED [{code}] {msg}"
              except urllib.error.HTTPError as e:
                  body = json.load(e) if e.fp else {}
                  status = f"FAILED [{body.get('code', e.code)}] {body.get('msg', str(e))}"
              print(f"[{status}] {did}")

          # Clear sync state
          state = {
              "last_sync_time": None,
              "current_doc_id": None,
              "current_doc_month": None,
              "date_headers": {},
              "file_summary_count": 0,
              "file_summary": {},
              "file_tokens": {},
          }
          with open("sync_state.json", "w") as f:
              json.dump(state, f, ensure_ascii=False, indent=2)
          print("sync_state.json reset")
          PYEOF

      - name: Save cleared state
        uses: actions/cache/save@v4
        with:
          path: sync_state.json
          key: zsxq-sync-state-${{ secrets.ZSXQ_GROUP_ID }}-reset-${{ github.run_id }}
