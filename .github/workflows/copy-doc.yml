name: Copy Document
on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Copy wiki node
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python3 -c "
          import requests
          BASE='https://open.feishu.cn/open-apis'
          r=requests.post(f'{BASE}/auth/v3/tenant_access_token/internal',
            json={'app_id':'$FEISHU_APP_ID','app_secret':'$FEISHU_APP_SECRET'},timeout=10)
          token=r.json()['tenant_access_token']
          H={'Authorization':f'Bearer {token}','Content-Type':'application/json'}

          token_in='VduawSlAXiPaFskfPXpcIFFgnje'

          # Step 1: Get wiki node info (token is a wiki_token)
          print('Getting wiki node info...')
          r_info=requests.get(f'{BASE}/wiki/v2/nodes/{token_in}',
            headers=H, timeout=10)
          di=r_info.json()
          print(f'Node info: code={di.get(\"code\")}')
          if di.get('code')==0:
            node=di['data']['node']
            real_token=node['node_token']
            space_id=node['space_id']
            print(f'  node_token={real_token}, space_id={space_id}, type={node.get(\"obj_type\")}')
            # Step 2: Copy
            print('Copying...')
            r2=requests.post(f'{BASE}/wiki/v2/spaces/{space_id}/nodes/{real_token}/copy',
              headers=H, json={'title':'知识星球 - 副本'},timeout=30)
            d2=r2.json()
            print(f'Copy result: Code={d2.get(\"code\")}, Msg={d2.get(\"msg\")}')
            if d2.get('code')==0:
              nd=d2['data']['node']
              print(f'https://larkcommunity.feishu.cn/wiki/{nd[\"node_token\"]}')
          else:
            # Fallback: docx copy
            r3=requests.post(f'{BASE}/docx/v1/documents/{token_in}/copy',
              headers=H, json={'title':'知识星球 - 副本'},timeout=30)
            d3=r3.json()
            print(f'Docx result: Code={d3.get(\"code\")}, Msg={d3.get(\"msg\")}')
            if d3.get('code')==0:
              print(f'https://larkcommunity.feishu.cn/docx/{d3[\"data\"][\"document\"][\"document_id\"]}')
          "
