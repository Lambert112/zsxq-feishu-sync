name: Copy Document
on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Copy wiki node
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python3 -c "
          import requests
          BASE='https://open.feishu.cn/open-apis'
          r=requests.post(f'{BASE}/auth/v3/tenant_access_token/internal',
            json={'app_id':'$FEISHU_APP_ID','app_secret':'$FEISHU_APP_SECRET'},timeout=10)
          token=r.json()['tenant_access_token']
          H={'Authorization':f'Bearer {token}','Content-Type':'application/json'}

          token_in='VduawSlAXiPaFskfPXpcIFFgnje'

          # Try 1: drive/v1/files/copy?type=wiki_node
          print('Trying drive copy...')
          r=requests.post(f'{BASE}/drive/v1/files/{token_in}/copy?type=wiki_node',
            headers=H, json={'name':'知识星球 - 副本'},timeout=30)
          print(f'Drive wiki_node: code={r.status_code}, resp={r.text[:500]}')
          try:
            d=r.json()
            if d.get('code')==0:
              tok=d['data']['file']['token']
              print(f'https://larkcommunity.feishu.cn/wiki/{tok}')
          except: pass

          # Try 2: drive/v1/files/copy?type=docx
          r2=requests.post(f'{BASE}/drive/v1/files/{token_in}/copy?type=docx',
            headers=H, json={'name':'知识星球 - 副本'},timeout=30)
          print(f'Drive docx: code={r2.status_code}, resp={r2.text[:500]}')
          try:
            d2=r2.json()
            if d2.get('code')==0:
              tok2=d2['data']['file']['token']
              print(f'https://larkcommunity.feishu.cn/docx/{tok2}')
          except: pass

          # Try 3: wiki node copy
          r3=requests.get(f'{BASE}/wiki/v2/nodes/{token_in}', headers=H, timeout=10)
          print(f'Wiki node: code={r3.status_code}, resp={r3.text[:800]}')
          try:
            d3=r3.json()
            if d3.get('code')==0:
              nd=d3['data']['node']
              r4=requests.post(f'{BASE}/wiki/v2/spaces/{nd[\"space_id\"]}/nodes/{token_in}/copy',
                headers=H, json={'title':'知识星球 - 副本'},timeout=30)
              print(f'Wiki copy: code={r4.status_code}, resp={r4.text[:500]}')
              try:
                d4=r4.json()
                if d4.get('code')==0:
                  print(f'https://larkcommunity.feishu.cn/wiki/{d4[\"data\"][\"node\"][\"node_token\"]}')
              except: print(f'Raw: {r4.text[:500]}')
          except: pass
          "
