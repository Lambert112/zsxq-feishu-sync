name: Copy Document
on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Copy wiki node
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          python3 -c "
          import requests
          BASE='https://open.feishu.cn/open-apis'
          r=requests.post(f'{BASE}/auth/v3/tenant_access_token/internal',
            json={'app_id':'$FEISHU_APP_ID','app_secret':'$FEISHU_APP_SECRET'},timeout=10)
          token=r.json()['tenant_access_token']
          H={'Authorization':f'Bearer {token}','Content-Type':'application/json'}

          token_in='CQygwWn7jiDySdkNLZGcgHQinih'

          # Transfer ownership with type=wiki
          print('Transferring ownership of wiki node...')
          user_id='${{ secrets.FEISHU_USER_ID }}'
          member_type='openid' if user_id.startswith('ou_') else 'userid'
          r=requests.post(f'{BASE}/drive/v1/permissions/{token_in}/members/transfer_owner?type=wiki',
            headers=H, json={'member_type':member_type,'member_id':user_id},timeout=15)
          print(f'Transfer: code={r.status_code}, resp={r.text[:500]}')
          if r.json().get('code')==0:
            print('✅ 所有权转移成功!')
          "
